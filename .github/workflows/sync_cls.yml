name: Sync CLS & Recruitment

on:
  schedule:
    # Moi 2 gio trong khung 8h-18h gio VN (UTC+7) = 1,3,5,7,9,11 gio UTC. Sau 19h VN ngung,
    # 8h sang hom sau tiep tuc. (Du lieu tuyen dung chi nhap trong gio lam viec.)
    - cron: '0 1,3,5,7,9,11 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: 'False'
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLS_SECRET_KEY: ${{ secrets.CLS_SECRET_KEY }}
      RECRUITMENT_SOURCE_CSV_URL: ${{ secrets.RECRUITMENT_SOURCE_CSV_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python manage.py sync_recruitment --tenant "Demo Tenant"
      - run: python manage.py sync_cls --tenant "Demo Tenant"
